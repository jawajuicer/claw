{% extends "base.html" %}
{% block title %}Chat{% endblock %}
{% block main_class %}container-fluid{% endblock %}

{% block content %}
<div class="chat-layout">
    <!-- Conversation sidebar (always visible on desktop) -->
    <div class="convo-sidebar" id="convo-sidebar">
        <div class="convo-sidebar-header">
            <strong>Conversations</strong>
        </div>
        <input type="search" id="convo-search" placeholder="Search..." class="convo-search-input">
        <button class="convo-new-btn" onclick="newChat()">+ New Chat</button>
        <div class="convo-list" id="convo-list"></div>
    </div>

    <div class="chat-container">
        <div class="chat-header">
            <div class="chat-header-left">
                <button class="btn-sidebar-toggle convo-mobile-toggle" onclick="toggleSidebar()" aria-label="Conversations">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 12h18M3 6h18M3 18h18"/>
                    </svg>
                </button>
                <h2>Chat</h2>
            </div>
            <div class="chat-header-right">
                <span id="provider-badge" class="provider-badge provider-local" title="AI Backend">Local</span>
                <select id="model-select" class="chat-model-select" title="Model for this conversation">
                    <option value="">Default</option>
                </select>
                <button class="btn-save-chat" id="save-btn" onclick="saveConversation()" style="display:none">Save</button>
                <button class="btn-new-chat" onclick="newChat()">New Chat</button>
            </div>
        </div>

        <!-- Context meter -->
        <div class="context-meter" id="context-meter">
            <div class="context-meter-bar">
                <div class="context-meter-fill" id="context-fill"></div>
            </div>
            <span class="context-meter-label" id="context-label">Context: 0 / {{ context_window }} tokens (0%)</span>
        </div>

        <div class="chat-messages" id="messages">
            <div class="chat-welcome">
                <p>Talk to <strong>The Claw</strong>. Type a message below.</p>
            </div>
        </div>

        <div class="chat-input-bar">
            <textarea id="chat-input" placeholder="Type a message..." rows="1"
                      onkeydown="handleKey(event)" autofocus></textarea>
            <button id="send-btn" onclick="sendMessage()" aria-label="Send">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/>
                </svg>
            </button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('chat-input');
const sendBtn = document.getElementById('send-btn');
const saveBtn = document.getElementById('save-btn');
const contextFill = document.getElementById('context-fill');
const contextLabel = document.getElementById('context-label');
let processing = false;
let currentConvoId = null;
let chatMessages = [];  // local message log for saving
const autoSave = {{ 'true' if save_conversations else 'false' }};
const contextWindow = {{ context_window }};
const ttsEnabled = {{ 'true' if tts_enabled else 'false' }};
const ttsAutoplay = {{ 'true' if tts_autoplay else 'false' }};
let currentAudio = null;

function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
}

function autoResize() {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 150) + 'px';
}
inputEl.addEventListener('input', autoResize);

// Command hints dropdown
var commandHintsEl = null;
var knownCommands = [
    {name: '/help', desc: 'Show available commands'},
    {name: '/status', desc: 'Show system status'},
    {name: '/usage', desc: 'Show token usage'},
    {name: '/think', desc: 'Set thinking level'},
    {name: '/model', desc: 'Switch model'},
    {name: '/compact', desc: 'Summarize context'},
    {name: '/new', desc: 'Start new conversation'},
];

function showCommandHints() {
    hideCommandHints();
    commandHintsEl = document.createElement('div');
    commandHintsEl.className = 'command-hints';
    knownCommands.forEach(function(cmd) {
        var item = document.createElement('div');
        item.className = 'command-hint-item';
        item.innerHTML = '<strong>' + cmd.name + '</strong> <span>' + cmd.desc + '</span>';
        item.onclick = function() {
            inputEl.value = cmd.name + ' ';
            hideCommandHints();
            inputEl.focus();
        };
        commandHintsEl.appendChild(item);
    });
    var inputBar = document.querySelector('.chat-input-bar');
    inputBar.style.position = 'relative';
    inputBar.appendChild(commandHintsEl);
}

function hideCommandHints() {
    if (commandHintsEl) {
        commandHintsEl.remove();
        commandHintsEl = null;
    }
}

inputEl.addEventListener('input', function() {
    if (this.value === '/') {
        showCommandHints();
    } else {
        hideCommandHints();
    }
});

function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
}

function setProcessing(on) {
    processing = on;
    inputEl.disabled = on;
    sendBtn.disabled = on;
    if (!on) inputEl.focus();
}

function updateContextMeter(promptTokens) {
    if (!promptTokens || !contextWindow) return;
    const pct = Math.min(100, Math.round((promptTokens / contextWindow) * 100));
    contextFill.style.width = pct + '%';

    // Color shift: green → yellow → red
    if (pct < 50) {
        contextFill.style.background = 'var(--claw-green)';
    } else if (pct < 80) {
        contextFill.style.background = 'var(--claw-yellow)';
    } else {
        contextFill.style.background = 'var(--claw-accent)';
    }

    contextLabel.textContent = 'Context: ' + promptTokens.toLocaleString() + ' / ' + contextWindow.toLocaleString() + ' tokens (' + pct + '%)';
}

function updateSaveButton() {
    if (!autoSave && chatMessages.length > 0) {
        saveBtn.style.display = '';
    } else {
        saveBtn.style.display = 'none';
    }
}

function appendMessage(role, content, toolsUsed, usage, isCommand) {
    // Remove welcome message if present
    const welcome = messagesEl.querySelector('.chat-welcome');
    if (welcome) welcome.remove();

    const bubble = document.createElement('div');
    bubble.className = 'chat-bubble chat-' + role;
    if (isCommand) bubble.classList.add('chat-command');

    const text = document.createElement('div');
    text.className = 'chat-text';
    text.textContent = content;
    bubble.appendChild(text);

    if (toolsUsed && toolsUsed.length > 0) {
        const tools = document.createElement('div');
        tools.className = 'chat-tools';
        toolsUsed.forEach(function(name) {
            const badge = document.createElement('span');
            badge.className = 'tool-badge';
            badge.textContent = name;
            tools.appendChild(badge);
        });
        bubble.appendChild(tools);
    }

    if (usage && usage.elapsed_s) {
        const meta = document.createElement('div');
        meta.className = 'chat-meta';
        const parts = [];
        parts.push(usage.elapsed_s + 's');
        if (usage.tokens_per_sec > 0) parts.push(usage.tokens_per_sec + ' tok/s');
        if (usage.total_tokens > 0) parts.push(usage.total_tokens + ' tokens');
        if (usage.llm_calls > 1) parts.push(usage.llm_calls + ' calls');
        if (usage.provider && usage.provider !== 'local') parts.push(usage.provider);
        meta.textContent = parts.join(' \u00b7 ');
        bubble.appendChild(meta);
    }

    // TTS play button for assistant messages
    if (role === 'assistant' && ttsEnabled && content) {
        const btn = document.createElement('button');
        btn.className = 'tts-play-btn';
        btn.title = 'Play audio';
        btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
        btn.onclick = function() { playTTS(content, btn); };
        bubble.appendChild(btn);
    }

    messagesEl.appendChild(bubble);
    scrollToBottom();
}

function playTTS(text, btn) {
    // Stop any currently playing audio
    if (currentAudio) {
        var oldSrc = currentAudio.src;
        currentAudio.pause();
        currentAudio = null;
        URL.revokeObjectURL(oldSrc);
        // Reset all play buttons
        document.querySelectorAll('.tts-play-btn.playing').forEach(function(b) {
            b.classList.remove('playing');
            b.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
        });
    }

    // Show loading state
    btn.classList.add('playing');
    btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>';

    fetch('/api/tts', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({text: text}),
    })
    .then(function(res) {
        if (!res.ok) throw new Error('TTS request failed');
        return res.blob();
    })
    .then(function(blob) {
        const url = URL.createObjectURL(blob);
        const audio = new Audio(url);
        currentAudio = audio;

        audio.onended = function() {
            currentAudio = null;
            btn.classList.remove('playing');
            btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
            URL.revokeObjectURL(url);
        };

        audio.play();
    })
    .catch(function(err) {
        console.error('TTS playback error:', err);
        btn.classList.remove('playing');
        btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
    });
}

function showTyping() {
    const el = document.createElement('div');
    el.className = 'chat-bubble chat-assistant chat-typing';
    el.id = 'typing-indicator';
    el.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';
    messagesEl.appendChild(el);
    scrollToBottom();
}

function hideTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
}

function createStreamingBubble() {
    // Remove welcome message if present
    const welcome = messagesEl.querySelector('.chat-welcome');
    if (welcome) welcome.remove();

    const bubble = document.createElement('div');
    bubble.className = 'chat-bubble chat-assistant';
    bubble.id = 'streaming-bubble';

    const text = document.createElement('div');
    text.className = 'chat-text streaming-cursor';
    text.id = 'streaming-text';
    bubble.appendChild(text);

    const tools = document.createElement('div');
    tools.className = 'chat-tools';
    tools.id = 'streaming-tools';
    tools.style.display = 'none';
    bubble.appendChild(tools);

    messagesEl.appendChild(bubble);
    scrollToBottom();
    return bubble;
}

function finalizeStreamingBubble(content, toolsUsed, usage) {
    const bubble = document.getElementById('streaming-bubble');
    if (!bubble) return;
    bubble.removeAttribute('id');

    const textEl = document.getElementById('streaming-text');
    if (textEl) {
        textEl.classList.remove('streaming-cursor');
        textEl.removeAttribute('id');
        textEl.textContent = content;
    }

    const toolsEl = document.getElementById('streaming-tools');
    if (toolsEl) toolsEl.removeAttribute('id');

    if (usage && usage.elapsed_s) {
        const meta = document.createElement('div');
        meta.className = 'chat-meta';
        const parts = [];
        parts.push(usage.elapsed_s + 's');
        if (usage.tokens_per_sec > 0) parts.push(usage.tokens_per_sec + ' tok/s');
        if (usage.total_tokens > 0) parts.push(usage.total_tokens + ' tokens');
        if (usage.llm_calls > 1) parts.push(usage.llm_calls + ' calls');
        if (usage.provider && usage.provider !== 'local') parts.push(usage.provider);
        meta.textContent = parts.join(' \u00b7 ');
        bubble.appendChild(meta);
    }

    // TTS play button
    if (ttsEnabled && content) {
        const btn = document.createElement('button');
        btn.className = 'tts-play-btn';
        btn.title = 'Play audio';
        btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
        btn.onclick = function() { playTTS(content, btn); };
        bubble.appendChild(btn);
    }
}

async function sendMessage() {
    if (processing) return;
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    appendMessage('user', text);
    chatMessages.push({role: 'user', content: text});
    updateSaveButton();
    setProcessing(true);

    const chatBody = {message: text};
    const selectedModel = modelSelect.value;
    if (selectedModel) chatBody.model = selectedModel;

    let streamOk = false;

    try {
        const res = await fetch('/api/chat/stream', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(chatBody),
        });

        if (!res.ok || !res.body) {
            throw new Error('Stream connection failed');
        }

        streamOk = true;
        createStreamingBubble();

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let fullContent = '';
        let toolsUsed = [];
        let finalUsage = null;
        let done = false;

        while (!done) {
            const {value, done: readerDone} = await reader.read();
            if (readerDone) break;

            buffer += decoder.decode(value, {stream: true});

            // Parse SSE lines: "data: {...}\n\n"
            const lines = buffer.split('\n');
            buffer = lines.pop(); // keep incomplete line in buffer

            for (const line of lines) {
                const trimmed = line.trim();
                if (!trimmed || trimmed.startsWith(':')) continue;

                let payload = trimmed;
                if (payload.startsWith('data:')) {
                    payload = payload.slice(5).trim();
                }
                if (!payload) continue;

                let event;
                try {
                    event = JSON.parse(payload);
                } catch (e) {
                    continue;
                }

                if (event.type === 'token') {
                    fullContent += event.content;
                    const textEl = document.getElementById('streaming-text');
                    if (textEl) {
                        textEl.textContent = fullContent;
                        scrollToBottom();
                    }
                } else if (event.type === 'tool_start') {
                    const toolsEl = document.getElementById('streaming-tools');
                    if (toolsEl) {
                        toolsEl.style.display = '';
                        const badge = document.createElement('span');
                        badge.className = 'tool-badge';
                        badge.textContent = event.name;
                        toolsEl.appendChild(badge);
                    }
                    if (toolsUsed.indexOf(event.name) === -1) {
                        toolsUsed.push(event.name);
                    }
                } else if (event.type === 'done') {
                    fullContent = event.content;
                    toolsUsed = event.tools_used || toolsUsed;
                    finalUsage = event.usage;
                    if (event.is_command) {
                        var streamBubble = document.getElementById('streaming-bubble');
                        if (streamBubble) streamBubble.classList.add('chat-command');
                    }
                    done = true;
                } else if (event.type === 'error') {
                    fullContent = event.message || 'An error occurred.';
                    done = true;
                }
            }
        }

        finalizeStreamingBubble(fullContent, toolsUsed, finalUsage);
        chatMessages.push({
            role: 'assistant',
            content: fullContent,
            tools_used: toolsUsed,
            usage: finalUsage,
        });

        if (finalUsage && finalUsage.last_prompt_tokens) {
            updateContextMeter(finalUsage.last_prompt_tokens);
        }

        if (ttsAutoplay && fullContent) {
            var autoBtn = messagesEl.querySelector('.chat-bubble:last-child .tts-play-btn');
            if (autoBtn) playTTS(fullContent, autoBtn);
        }

        if (autoSave) {
            await saveConversation(true);
        }
        updateSaveButton();

    } catch (err) {
        // Fallback to non-streaming endpoint
        if (!streamOk) {
            try {
                showTyping();
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(chatBody),
                });
                hideTyping();
                if (!res.ok) {
                    const errData = await res.json().catch(function() { return {}; });
                    appendMessage('assistant', errData.error || 'Request failed.');
                } else {
                    const data = await res.json();
                    appendMessage('assistant', data.content, data.tools_used, data.usage, data.is_command);
                    chatMessages.push({
                        role: 'assistant',
                        content: data.content,
                        tools_used: data.tools_used,
                        usage: data.usage,
                    });
                    if (data.usage && data.usage.last_prompt_tokens) {
                        updateContextMeter(data.usage.last_prompt_tokens);
                    }
                    if (ttsAutoplay && data.content) {
                        var autoBtn = messagesEl.querySelector('.chat-bubble:last-child .tts-play-btn');
                        if (autoBtn) playTTS(data.content, autoBtn);
                    }
                    if (autoSave) {
                        await saveConversation(true);
                    }
                    updateSaveButton();
                }
            } catch (fallbackErr) {
                hideTyping();
                appendMessage('assistant', 'Error: could not reach the server.');
            }
        } else {
            // Stream was connected but broke mid-stream
            finalizeStreamingBubble('Error: stream interrupted.', [], null);
        }
    } finally {
        setProcessing(false);
    }
}

async function saveConversation(silent) {
    if (chatMessages.length === 0) return;
    try {
        const res = await fetch('/api/conversations/save', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({id: currentConvoId, messages: chatMessages}),
        });
        const data = await res.json();
        if (data.status === 'ok') {
            currentConvoId = data.id;
            if (!silent) {
                saveBtn.textContent = 'Saved!';
                setTimeout(function() { saveBtn.textContent = 'Save'; }, 1500);
            }
            loadConversationList();
        }
    } catch (e) {
        if (!silent) {
            saveBtn.textContent = 'Error';
            setTimeout(function() { saveBtn.textContent = 'Save'; }, 1500);
        }
    }
}

async function newChat() {
    try {
        const res = await fetch('/api/chat/new', {method: 'POST'});
        if (!res.ok) throw new Error('Failed to reset');
    } catch (e) {
        appendMessage('assistant', 'Could not start a new chat. Please try again.');
        return;
    }
    messagesEl.replaceChildren();
    const welcome = document.createElement('div');
    welcome.className = 'chat-welcome';
    welcome.innerHTML = '<p>Talk to <strong>The Claw</strong>. Type a message below.</p>';
    messagesEl.appendChild(welcome);
    inputEl.value = '';
    inputEl.style.height = 'auto';
    inputEl.focus();
    currentConvoId = null;
    chatMessages = [];
    updateSaveButton();
    contextFill.style.width = '0%';
    contextLabel.textContent = 'Context: 0 / ' + contextWindow.toLocaleString() + ' tokens (0%)';
}

// ── Conversation list ──────────────────────────────────────────────

function toggleSidebar() {
    const sidebar = document.getElementById('convo-sidebar');
    sidebar.classList.toggle('open');
    if (sidebar.classList.contains('open')) {
        loadConversationList();
    }
}

let convoSearchTimer = null;
const convoSearchInput = document.getElementById('convo-search');

convoSearchInput.addEventListener('input', function() {
    clearTimeout(convoSearchTimer);
    convoSearchTimer = setTimeout(function() {
        loadConversationList(convoSearchInput.value.trim());
    }, 300);
});

async function loadConversationList(query) {
    const listEl = document.getElementById('convo-list');
    try {
        const url = query ? '/api/conversations/search?q=' + encodeURIComponent(query) : '/api/conversations';
        const res = await fetch(url);
        const convos = await res.json();
        listEl.innerHTML = '';
        if (convos.length === 0) {
            listEl.innerHTML = '<div class="convo-empty">No saved conversations</div>';
            return;
        }
        convos.forEach(function(c) {
            const item = document.createElement('div');
            item.className = 'convo-item' + (c.id === currentConvoId ? ' active' : '');

            const title = document.createElement('div');
            title.className = 'convo-title';
            title.textContent = c.title;
            title.onclick = function() { loadConversation(c.id); };

            const meta = document.createElement('div');
            meta.className = 'convo-meta';
            const date = new Date(c.updated_at);
            meta.textContent = c.message_count + ' msgs · ' + date.toLocaleDateString();

            const exportBtn = document.createElement('a');
            exportBtn.className = 'convo-export';
            exportBtn.href = '/api/conversations/' + c.id + '/export?format=md';
            exportBtn.title = 'Export';
            exportBtn.textContent = '\u21E3';
            exportBtn.onclick = function(e) { e.stopPropagation(); };

            const del = document.createElement('button');
            del.className = 'convo-delete';
            del.textContent = '\u00D7';
            del.title = 'Delete';
            del.onclick = function(e) { e.stopPropagation(); deleteConversation(c.id); };

            const row = document.createElement('div');
            row.className = 'convo-item-row';
            row.appendChild(title);
            row.appendChild(exportBtn);
            row.appendChild(del);

            item.appendChild(row);
            item.appendChild(meta);
            listEl.appendChild(item);
        });
    } catch (e) {
        listEl.innerHTML = '<div class="convo-empty">Failed to load</div>';
    }
}

async function loadConversation(id) {
    try {
        const res = await fetch('/api/conversations/' + id);
        if (!res.ok) return;
        const convo = await res.json();

        // Clear and render
        messagesEl.replaceChildren();
        currentConvoId = convo.id;
        chatMessages = convo.messages || [];

        chatMessages.forEach(function(msg) {
            appendMessage(msg.role, msg.content, msg.tools_used, msg.usage);
        });

        // Replay messages into agent session so it has context
        const loadRes = await fetch('/api/chat/load', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({messages: chatMessages}),
        });
        const loadData = await loadRes.json();

        // Update context meter with estimated token count
        if (loadData.estimated_tokens) {
            updateContextMeter(loadData.estimated_tokens);
        }

        updateSaveButton();

        // Close sidebar on mobile
        if (window.innerWidth < 768) {
            document.getElementById('convo-sidebar').classList.remove('open');
        }
    } catch (e) {
        console.error('Failed to load conversation', e);
    }
}

async function deleteConversation(id) {
    try {
        await fetch('/api/conversations/' + id, {method: 'DELETE'});
        if (id === currentConvoId) {
            currentConvoId = null;
        }
        loadConversationList();
    } catch (e) {
        console.error('Failed to delete conversation', e);
    }
}

// ── Model selector ────────────────────────────────────────────────

const modelSelect = document.getElementById('model-select');

fetch('/api/models')
    .then(r => r.json())
    .then(data => {
        if (!data.models || !data.models.length) return;
        data.models.forEach(m => {
            const opt = document.createElement('option');
            opt.value = m.name;
            const paramSize = m.parameter_size || '';
            const sizeGB = m.size ? (m.size / 1e9).toFixed(1) + 'GB' : '';
            const extra = [paramSize, sizeGB].filter(Boolean).join(', ');
            opt.textContent = m.name + (extra ? ' (' + extra + ')' : '');
            modelSelect.appendChild(opt);
        });
    })
    .catch(() => {});

// Load conversation list on page load
loadConversationList();

// Auto-load conversation from ?load= query param (from conversations page)
(function() {
    const params = new URLSearchParams(window.location.search);
    const loadId = params.get('load');
    if (loadId) {
        loadConversation(loadId);
        // Clean URL
        window.history.replaceState({}, '', '/');
    }
})();

// ── Cloud LLM provider badge ──────────────────────────────────────

function updateProviderBadge(provider) {
    const badge = document.getElementById('provider-badge');
    if (!badge) return;
    badge.className = 'provider-badge provider-' + provider;
    badge.textContent = provider === 'local' ? 'Local' : provider.charAt(0).toUpperCase() + provider.slice(1);
    badge.title = provider === 'local' ? 'Using local AI (private)' : 'Using ' + provider + ' cloud AI';
}

// Get initial provider status
fetch('/api/cloud-llm/status')
    .then(r => r.json())
    .then(d => updateProviderBadge(d.active_provider))
    .catch(() => {});

// Listen for provider changes via SSE (if event source exists on page)
(function() {
    try {
        const evtSource = new EventSource('/api/events');
        evtSource.addEventListener('llm_provider', function(e) {
            const data = JSON.parse(e.data);
            updateProviderBadge(data.provider);
        });
    } catch(e) { /* SSE not available, badge will update on page reload */ }
})();
</script>
