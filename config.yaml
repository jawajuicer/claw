# The Claw — Default Configuration

audio:
  device_index: null          # null = system default
  sample_rate: 16000
  channels: 1
  block_size: 1280            # 80ms at 16kHz — openWakeWord chunk size
  silence_threshold: 0.01     # RMS threshold for silence detection
  silence_duration: 2.0       # seconds of silence before stopping recording
  max_record_seconds: 30      # safety cap
  chime_enabled: true          # play acknowledgment tone on wake word detection
  chime_volume: 0.5            # 0.0–1.0
  chime_frequency: 880         # Hz (plays ascending two-tone: 0.75x → 1x)
  chime_duration_ms: 200       # total chime duration in milliseconds

wake:
  model_paths:
    - hey_jarvis_v0.1
  thresholds: {}
  default_threshold: 0.5
  inference_framework: onnx
  custom_models_dir: data/models/wake

whisper:
  model_size: base
  compute_type: int8
  language: en
  beam_size: 5

tts:
  enabled: true
  engine: piper                # "piper" or "fish_speech"
  piper_model: data/models/tts/piper/en_US-lessac-medium.onnx
  piper_speaker_id: null
  fish_speech_url: http://localhost:8090
  fish_speech_reference_audio: ""
  fish_speech_reference_text: ""
  speed: 1.0                   # 0.5 = slow, 1.0 = normal, 2.0 = fast
  voice_loop_enabled: true     # speak responses through physical speaker
  admin_chat_enabled: true     # show play buttons in admin chat
  admin_chat_autoplay: false   # auto-play voice responses in admin chat

llm:
  base_url: http://localhost:11434/v1
  api_key: ollama              # Ollama ignores this but OpenAI SDK requires it
  model: qwen3:14b
  temperature: 0.7
  max_tokens: 1024
  max_iterations: 5            # bounded agent loop
  context_window: 32768        # model context window size in tokens
  system_prompt: |
    You are The Claw, a helpful voice assistant. You are running locally
    on the user's machine. You have access to tools via MCP servers.
    Be concise in your responses since they will be spoken aloud.

memory:
  chroma_path: data/chromadb
  embedding_model: all-MiniLM-L6-v2
  max_results: 5
  conversation_collection: conversations
  facts_collection: facts
  categories_collection: categories

mcp:
  tools_dir: mcp_tools
  startup_timeout: 10          # seconds to wait for server handshake
  enabled_servers:
    - youtube_music
    - system_control
    - notes
    - local_calendar
    - google_calendar
    - gmail

youtube_music:
  enabled: false
  auth_file: data/youtube_music/auth.json
  history_file: data/youtube_music/history.json
  auto_radio: true
  default_volume: 80
  max_history: 500
  max_search_results: 5

notes:
  enabled: true
  storage_dir: data/notes
  max_notes: 1000

local_calendar:
  enabled: true
  storage_file: data/calendar/local.json

google_auth:
  credentials_file: data/google/credentials.json
  scopes:
    - https://www.googleapis.com/auth/gmail.compose
    - https://www.googleapis.com/auth/gmail.readonly
    - https://www.googleapis.com/auth/calendar
  accounts: {}
  # Accounts are added via: python mcp_tools/google_auth/setup_auth.py
  # Example structure after setup:
  #   accounts:
  #     personal:
  #       email: user@gmail.com
  #       token_file: data/google/tokens/personal.json
  #       calendar:
  #         enabled: true
  #         default_calendar: primary
  #         calendars: {}
  #         timezone: America/New_York
  #       gmail:
  #         enabled: true
  #         max_results: 10
  #         default_label: INBOX
  #       youtube_music: false

chat:
  save_conversations: false
  conversations_dir: data/conversations

admin:
  host: 0.0.0.0
  port: 8080
  log_buffer_size: 1000
